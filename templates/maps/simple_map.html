{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Geo Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        #map { width: 100vw; height: 90vh; }
        #citySelect { margin: 10px; padding: 5px; font-size: 16px; }
        #status { margin: 10px; color: #333; }
    </style>
</head>
<body>
    <select id="citySelect">
        <option value="">Select a city...</option>
    </select>
    <span id="status"></span>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{% static 'maps/js/Leaflet.VectorGrid.bundled.min.js' %}"></script>
    <script src="{% static 'maps/js/simple_map.js' %}"></script>
</body>
</html>
