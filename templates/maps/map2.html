<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title|default:"Geo Mapping Visualization" }}</title>
    
    <!-- Mapbox GL JS -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
        }
        
        #sidebar {
            width: 350px;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 20px;
            overflow-y: auto;
        }
        
        #map {
            flex: 1;
            height: 100vh;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }
        
        select, button {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .category-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }
        
        .category-checkbox {
            margin-right: 10px;
        }
        
        .category-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 10px;
            border: 1px solid #ccc;
        }
        
        .category-name {
            flex: 1;
            font-size: 14px;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }
        
        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .success {
            color: #28a745;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .info-panel {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        
        .city-info h2 {
            margin-bottom: 5px;
            color: #333;
        }
        
        .city-info p {
            color: #666;
            font-size: 14px;
        }
        
        .legend {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        
        .status {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .debug-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        .layer-status {
            font-size: 11px;
            margin-left: 5px;
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        .layer-success {
            background: #d4edda;
            color: #155724;
        }
        
        .layer-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="info-panel">
            <h2>Geo Mapping Viewer</h2>
            <p>Fixed version with proper data positioning</p>
            <div id="status" class="status">
                Ready to load data...
            </div>
            <div id="debugInfo" class="debug-info"></div>
        </div>
        
        <div class="control-group">
            <h3>Select City</h3>
            <select id="citySelect">
                <option value="">Loading cities...</option>
            </select>
            <div id="cityError" class="error"></div>
        </div>
        
        <div class="control-group">
            <button id="loadAllCategories">Load All Categories</button>
            <button id="clearMap">Clear Map</button>
            <button id="flyToDataArea">Fly to Data Area</button>
            <button id="debugToggle">Show Debug Info</button>
        </div>
        
        <div class="control-group">
            <h3>Categories & Layers</h3>
            <div id="categoryList" class="loading">
                Select a city to load categories
            </div>
        </div>
        
        <div class="info-panel" id="cityInfo" style="display: none;">
            <div class="city-info">
                <h2 id="selectedCityName">-</h2>
                <p id="selectedCityDetails">-</p>
                <div class="legend">
                    Loaded layers: <span id="loadedLayersCount">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="map"></div>

    <script>
        // Configuration
        const API_BASE = window.location.origin + '{{ api_base_url|default:"/api" }}';
        
        // Global variables
        let map;
        let currentCity = null;
        let categories = [];
        let loadedLayers = new Set();
        let debugMode = false;

        function updateStatus(message) {
            const statusEl = document.getElementById('status');
            const now = new Date().toLocaleTimeString();
            statusEl.innerHTML += `<div>[${now}] ${message}</div>`;
            statusEl.scrollTop = statusEl.scrollHeight;
            console.log(message);
        }

        function updateDebugInfo(info) {
            if (debugMode) {
                const debugEl = document.getElementById('debugInfo');
                debugEl.innerHTML += `<div>${JSON.stringify(info, null, 2)}</div>`;
                debugEl.scrollTop = debugEl.scrollHeight;
            }
        }

        function updateLoadedLayersCount() {
            document.getElementById('loadedLayersCount').textContent = loadedLayers.size;
        }

        // Initialize map
        function initMap() {
            updateStatus('Initializing map...');
            
            map = new mapboxgl.Map({
                container: 'map',
                style: {
                    "version": 8,
                    "sources": {
                        "osm": {
                            "type": "raster",
                            "tiles": ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
                            "tileSize": 256,
                            "attribution": "© OpenStreetMap contributors"
                        }
                    },
                    "layers": [{
                        "id": "osm",
                        "type": "raster",
                        "source": "osm"
                    }]
                },
                // FIXED - Center on actual data area from your test results
                // Your data bounds: 77.4295, 12.8198 to 77.7760, 13.1426
                center: [77.6, 13.0], // Center of data area
                zoom: 10, // Good zoom level for seeing data
                accessToken: 'dummy'
            });

            // Add navigation controls
            map.addControl(new mapboxgl.NavigationControl());
            
            map.on('load', function() {
                updateStatus('Map loaded successfully');
                loadCities();
            });
            
            // Add debugging for tile loading
            map.on('sourcedata', function(e) {
                if (e.sourceDataType === 'visibility') return;
                updateDebugInfo({
                    type: 'sourcedata',
                    sourceId: e.sourceId,
                    isSourceLoaded: e.isSourceLoaded,
                    dataType: e.dataType
                });
            });

            map.on('error', function(e) {
                console.error('Map error:', e);
                updateStatus(`❌ Map error: ${e.error.message}`);
                updateDebugInfo({type: 'map_error', error: e.error});
            });

            // Add click handler to show coordinates
            map.on('click', function(e) {
                console.log(`Clicked: ${e.lngLat.lat.toFixed(6)}, ${e.lngLat.lng.toFixed(6)}`);
                updateDebugInfo({
                    type: 'map_click',
                    coordinates: [e.lngLat.lng, e.lngLat.lat],
                    zoom: map.getZoom()
                });
            });
        }

        // Load cities from API
        async function loadCities() {
            try {
                updateStatus('Loading cities...');
                const response = await fetch(`${API_BASE}/cities/`);
                const data = await response.json();
                
                const citySelect = document.getElementById('citySelect');
                citySelect.innerHTML = '<option value="">Select a city...</option>';
                
                data.results.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city.slug;
                    option.textContent = `${city.name}, ${city.state}`;
                    option.dataset.lat = city.center_lat;
                    option.dataset.lng = city.center_lng;
                    citySelect.appendChild(option);
                });
                
                document.getElementById('cityError').textContent = '';
                updateStatus('Cities loaded successfully');
            } catch (error) {
                console.error('Error loading cities:', error);
                document.getElementById('cityError').textContent = 'Error loading cities. Check if Django server is running.';
                updateStatus('Error loading cities');
            }
        }

        // Load categories for selected city
        async function loadCategories(citySlug) {
            try {
                updateStatus('Loading categories...');
                document.getElementById('categoryList').innerHTML = '<div class="loading">Loading categories...</div>';
                
                const response = await fetch(`${API_BASE}/cities/${citySlug}/layers/`);
                const data = await response.json();
                
                if (!data.layers || data.layers.length === 0) {
                    document.getElementById('categoryList').innerHTML = '<div class="error">No layers found for this city</div>';
                    updateStatus('No layers found');
                    return;
                }
                
                // Group layers by category
                const categoryMap = new Map();
                
                data.layers.forEach(layer => {
                    const categoryCode = layer.category_code;
                    if (!categoryMap.has(categoryCode)) {
                        categoryMap.set(categoryCode, {
                            code: categoryCode,
                            name: layer.category_name,
                            color: layer.style?.fill_color || '#666666',
                            layers: []
                        });
                    }
                    categoryMap.get(categoryCode).layers.push(layer);
                });
                
                categories = Array.from(categoryMap.values());
                renderCategories();
                updateStatus(`Loaded ${categories.length} categories with ${data.layers.length} total layers`);
                
            } catch (error) {
                console.error('Error loading categories:', error);
                document.getElementById('categoryList').innerHTML = '<div class="error">Error loading categories</div>';
                updateStatus('Error loading categories');
            }
        }

        // Render category list
        function renderCategories() {
            const categoryList = document.getElementById('categoryList');
            
            if (categories.length === 0) {
                categoryList.innerHTML = '<div class="loading">No categories found</div>';
                return;
            }
            
            categoryList.innerHTML = '';
            
            categories.forEach(category => {
                const categoryItem = document.createElement('div');
                categoryItem.className = 'category-item';
                
                categoryItem.innerHTML = `
                    <input type="checkbox" class="category-checkbox" 
                           id="category-${category.code}" 
                           data-category="${category.code}">
                    <div class="category-color" style="background-color: ${category.color}"></div>
                    <label for="category-${category.code}" class="category-name">
                        ${category.name} (${category.layers.length})
                    </label>
                    <span id="status-${category.code}" class="layer-status"></span>
                `;
                
                categoryList.appendChild(categoryItem);
                
                // Add event listener for checkbox
                const checkbox = categoryItem.querySelector('.category-checkbox');
                checkbox.addEventListener('change', function() {
                    const statusSpan = document.getElementById(`status-${category.code}`);
                    if (this.checked) {
                        statusSpan.textContent = 'Loading...';
                        statusSpan.className = 'layer-status';
                        loadCategoryLayers(category);
                    } else {
                        statusSpan.textContent = '';
                        statusSpan.className = 'layer-status';
                        removeCategoryLayers(category);
                    }
                });
            });
        }

        // Load layers for a category
        function loadCategoryLayers(category) {
            updateStatus(`Loading ${category.name} layers...`);
            let successCount = 0;
            let totalLayers = category.layers.length;
            
            category.layers.forEach(layer => {
                addLayerToMap(layer, category).then(success => {
                    if (success) successCount++;
                    
                    // Update status when all layers processed
                    if (successCount + (totalLayers - successCount) === totalLayers) {
                        const statusSpan = document.getElementById(`status-${category.code}`);
                        if (successCount > 0) {
                            statusSpan.textContent = `✓ ${successCount}/${totalLayers}`;
                            statusSpan.className = 'layer-status layer-success';
                        } else {
                            statusSpan.textContent = '✗ No data';
                            statusSpan.className = 'layer-status layer-error';
                        }
                    }
                });
            });
        }

        // Remove layers for a category
        function removeCategoryLayers(category) {
            updateStatus(`Removing ${category.name} layers...`);
            category.layers.forEach(layer => {
                removeLayerFromMap(layer);
            });
        }

        // FIXED - Add single layer to map with proper error handling
        async function addLayerToMap(layer, category) {
            const sourceId = `source-${layer.slug}`;
            const layerId = `layer-${layer.slug}`;
            
            if (loadedLayers.has(layerId)) {
                return true; // Already loaded
            }
            
            try {
                const tileUrlTemplate = `${API_BASE}/tiles/${currentCity}/${layer.slug}/{z}/{x}/{y}.mvt`;
                updateStatus(`Adding layer: ${layer.name}`);
                updateDebugInfo({
                    action: 'adding_layer',
                    layer: layer.name,
                    slug: layer.slug,
                    tile_url: tileUrlTemplate,
                    feature_count: layer.feature_count
                });
                
                // Add vector tile source
                map.addSource(sourceId, {
                    'type': 'vector',
                    'tiles': [tileUrlTemplate],
                    'minzoom': 8,
                    'maxzoom': 18
                });
                
                // FIXED - Use the layer slug as source-layer (this matches what your backend generates)
                // Your test showed layers like 'residential_main', 'agricultural_land' etc.
                const sourceLayerName = layer.slug;
                
                // Add the layer
                map.addLayer({
                    'id': layerId,
                    'type': 'fill',
                    'source': sourceId,
                    'source-layer': sourceLayerName,
                    'paint': {
                        'fill-color': category.color,
                        'fill-opacity': 0.6,
                        'fill-outline-color': '#333333'
                    }
                });
                
                // Add layer interactions
                addLayerInteractions(layerId, layer);
                loadedLayers.add(layerId);
                updateLoadedLayersCount();
                
                updateStatus(`✅ Successfully added layer: ${layer.name}`);
                updateDebugInfo({
                    action: 'layer_added_success',
                    layer_id: layerId,
                    source_layer: sourceLayerName
                });
                
                // Test tile loading after a short delay
                setTimeout(() => {
                    testLayerData(layerId, layer, tileUrlTemplate);
                }, 2000);
                
                return true;
                
            } catch (error) {
                console.error(`Error adding layer ${layer.name}:`, error);
                updateStatus(`❌ Error adding layer: ${layer.name} - ${error.message}`);
                updateDebugInfo({
                    action: 'layer_add_error',
                    layer: layer.name,
                    error: error.message
                });
                return false;
            }
        }

        // Test if layer has data at current map view
        async function testLayerData(layerId, layer, tileUrlTemplate) {
            try {
                const center = map.getCenter();
                const zoom = Math.floor(map.getZoom());
                
                // Convert to tile coordinates
                const tileX = Math.floor((center.lng + 180) / 360 * Math.pow(2, zoom));
                const tileY = Math.floor((1 - Math.log(Math.tan(center.lat * Math.PI / 180) + 
                    1 / Math.cos(center.lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
                
                const testUrl = tileUrlTemplate
                    .replace('{z}', zoom)
                    .replace('{x}', tileX)
                    .replace('{y}', tileY);
                
                const response = await fetch(testUrl);
                
                if (response.ok && response.headers.get('content-length') > 0) {
                    const contentLength = response.headers.get('content-length');
                    updateStatus(`✅ Layer ${layer.name} has data: ${contentLength} bytes at ${zoom}/${tileX}/${tileY}`);
                    updateDebugInfo({
                        action: 'layer_data_found',
                        layer: layer.name,
                        tile_url: testUrl,
                        size: contentLength
                    });
                } else {
                    updateStatus(`⚠️ Layer ${layer.name} has no data at current view - try zooming/panning`);
                    updateDebugInfo({
                        action: 'layer_no_data_at_view',
                        layer: layer.name,
                        tile_url: testUrl,
                        suggestion: 'Try flying to data area'
                    });
                }
            } catch (error) {
                updateDebugInfo({
                    action: 'layer_test_error',
                    layer: layer.name,
                    error: error.message
                });
            }
        }

        // Add layer interactions (popup, hover)
        function addLayerInteractions(layerId, layer) {
            // Add popup on click
            map.on('click', layerId, function(e) {
                if (e.features && e.features.length > 0) {
                    const properties = e.features[0].properties;
                    let popupContent = `<h4>${layer.name}</h4>`;
                    
                    // Show relevant properties
                    Object.keys(properties).forEach(key => {
                        if (properties[key] && key !== 'layer_id') {
                            popupContent += `<p><strong>${key}:</strong> ${properties[key]}</p>`;
                        }
                    });
                    
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(popupContent)
                        .addTo(map);
                    
                    updateDebugInfo({
                        action: 'feature_clicked',
                        layer: layer.name,
                        properties: properties
                    });
                }
            });
            
            // Change cursor on hover
            map.on('mouseenter', layerId, function() {
                map.getCanvas().style.cursor = 'pointer';
            });
            
            map.on('mouseleave', layerId, function() {
                map.getCanvas().style.cursor = '';
            });
        }

        // Remove layer from map
        function removeLayerFromMap(layer) {
            const sourceId = `source-${layer.slug}`;
            const layerId = `layer-${layer.slug}`;
            
            try {
                if (map.getLayer(layerId)) {
                    map.removeLayer(layerId);
                    loadedLayers.delete(layerId);
                    updateLoadedLayersCount();
                }
                
                if (map.getSource(sourceId)) {
                    map.removeSource(sourceId);
                }
                
                updateStatus(`Removed layer: ${layer.name}`);
                
            } catch (error) {
                console.error(`Error removing layer ${layer.name}:`, error);
            }
        }

        // Clear all layers
        function clearAllLayers() {
            updateStatus('Clearing all layers...');
            
            // Uncheck all checkboxes
            document.querySelectorAll('.category-checkbox').forEach(checkbox => {
                checkbox.checked = false;
            });
            
            // Clear status indicators
            document.querySelectorAll('.layer-status').forEach(status => {
                status.textContent = '';
                status.className = 'layer-status';
            });
            
            // Remove all layers
            const layersToRemove = Array.from(loadedLayers);
            layersToRemove.forEach(layerId => {
                try {
                    if (map.getLayer(layerId)) {
                        map.removeLayer(layerId);
                    }
                } catch (e) {
                    // Ignore errors
                }
            });
            
            // Remove all sources except base map
            const style = map.getStyle();
            if (style && style.sources) {
                Object.keys(style.sources).forEach(sourceId => {
                    if (sourceId !== 'osm') {
                        try {
                            map.removeSource(sourceId);
                        } catch (e) {
                            // Ignore errors
                        }
                    }
                });
            }
            
            loadedLayers.clear();
            updateLoadedLayersCount();
            updateStatus('Map cleared');
        }

        // Load all categories
        function loadAllCategories() {
            updateStatus('Loading all categories...');
            document.querySelectorAll('.category-checkbox').forEach(checkbox => {
                if (!checkbox.checked) {
                    checkbox.checked = true;
                    const categoryCode = checkbox.dataset.category;
                    const category = categories.find(c => c.code === categoryCode);
                    if (category) {
                        loadCategoryLayers(category);
                    }
                }
            });
        }

        // FIXED - Fly to the area where your test data actually exists
        function flyToDataArea() {
            // Your test results showed data bounds: 77.4295, 12.8198 to 77.7760, 13.1426
            map.fitBounds([
                [77.4295, 12.8198], // Southwest
                [77.7760, 13.1426]  // Northeast
            ], {
                padding: 50
            });
            updateStatus('Flying to data area...');
        }

        // Event listeners
        document.getElementById('citySelect').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            
            if (selectedOption.value) {
                currentCity = selectedOption.value;
                
                // Clear existing layers
                clearAllLayers();
                
                // FIXED - Don't center on city center, use data area instead
                // Update city info
                document.getElementById('selectedCityName').textContent = selectedOption.textContent;
                document.getElementById('selectedCityDetails').textContent = `Selected: ${selectedOption.textContent}`;
                document.getElementById('cityInfo').style.display = 'block';
                
                // Load categories first, then fly to data area
                loadCategories(currentCity).then(() => {
                    // Automatically fly to data area after loading categories
                    setTimeout(flyToDataArea, 1000);
                });
            } else {
                currentCity = null;
                document.getElementById('categoryList').innerHTML = '<div class="loading">Select a city to load categories</div>';
                document.getElementById('cityInfo').style.display = 'none';
                clearAllLayers();
                updateStatus('No city selected');
            }
        });

        document.getElementById('loadAllCategories').addEventListener('click', loadAllCategories);
        document.getElementById('clearMap').addEventListener('click', clearAllLayers);
        document.getElementById('flyToDataArea').addEventListener('click', flyToDataArea);
        document.getElementById('debugToggle').addEventListener('click', function() {
            debugMode = !debugMode;
            const debugEl = document.getElementById('debugInfo');
            debugEl.style.display = debugMode ? 'block' : 'none';
            this.textContent = debugMode ? 'Hide Debug Info' : 'Show Debug Info';
        });

        // Initialize the application
        console.log('API Base URL:', API_BASE);
        updateStatus('Starting application...');
        initMap();
    </script>
</body>
</html>
