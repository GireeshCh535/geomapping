---
- name: Deploy GeoMapping Application
  hosts: aws_servers
  become: yes
  vars:
    repo_url: "https://gitlab.com/rohit.boni/geomapping.git"
    project_name: "geomapping"
    project_dir: "/opt/{{ project_name }}"
    temp_dir: "/tmp/{{ project_name }}_deploy"
    zip_file: "{{ project_name }}.zip"

  tasks:
    # Step 1: Clone from git to local machine
    - name: Clean up old temp files on local machine
      file:
        path: "{{ temp_dir }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: no

    - name: Clone repository to local machine
      git:
        repo: "{{ repo_url }}"
        dest: "{{ temp_dir }}"
        depth: 1
      delegate_to: localhost
      run_once: true
      become: no

    # Step 2: Zip the cloned repository
    - name: Create zip archive of the project
      archive:
        path: "{{ temp_dir }}"
        dest: "/tmp/{{ zip_file }}"
        format: zip
      delegate_to: localhost
      run_once: true
      become: no

    # Step 3: Send zip file to server
    - name: Upload zip file to server
      copy:
        src: "/tmp/{{ zip_file }}"
        dest: "/tmp/{{ zip_file }}"

    # Step 4: Check if docker is installed, install if not
    - name: Check if Docker is installed
      command: which docker
      register: docker_installed
      ignore_errors: yes

    - name: Update apt cache
      apt:
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Install required packages for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - python3-pip
          - unzip
        state: present
      when: docker_installed.rc != 0

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: docker_installed.rc != 0

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: docker_installed.rc != 0

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Install Docker Compose standalone
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: docker_installed.rc != 0

    - name: Create docker-compose symlink
      file:
        src: /usr/local/bin/docker-compose
        dest: /usr/bin/docker-compose
        state: link
      when: docker_installed.rc != 0
      ignore_errors: yes

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # Install Docker Compose
    - name: Check if docker-compose is available
      command: which docker-compose
      register: docker_compose_installed
      ignore_errors: yes

    - name: Download Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: docker_compose_installed.rc != 0

    - name: Create docker-compose symlink
      file:
        src: /usr/local/bin/docker-compose
        dest: /usr/bin/docker-compose
        state: link
      when: docker_compose_installed.rc != 0
      ignore_errors: yes

    - name: Verify docker-compose installation
      command: docker-compose --version
      register: docker_compose_version

    - name: Display docker-compose version
      debug:
        msg: "Docker Compose version: {{ docker_compose_version.stdout }}"

    # Reset connection to apply group changes
    - name: Reset ssh connection
      meta: reset_connection

    # Step 5: Stop existing containers (preserve data)
    - name: Check if project directory exists
      stat:
        path: "{{ project_dir }}"
      register: project_exists

    - name: Stop existing Docker containers
      shell: |
        cd {{ project_dir }}
        docker-compose down --remove-orphans
      when: project_exists.stat.exists
      ignore_errors: yes
      become_user: ubuntu

    - name: Wait for containers to stop
      pause:
        seconds: 10
      when: project_exists.stat.exists

    # Step 6: Delete old directory and create new one
    - name: Force remove old project directory
      shell: rm -rf {{ project_dir }}
      ignore_errors: yes

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Unzip project files to project directory
      unarchive:
        src: "/tmp/{{ zip_file }}"
        dest: "{{ project_dir }}"
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        extra_opts: [--strip-components=1]

    - name: Update Django ALLOWED_HOSTS setting
      lineinfile:
        path: "{{ project_dir }}/geo_mapping/settings.py"
        regexp: '^ALLOWED_HOSTS\s*='
        line: "ALLOWED_HOSTS = ['*']"

    # Step 7: Build and start containers
    - name: Build Docker containers
      shell: docker-compose build --no-cache
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    - name: Start Docker containers
      shell: docker-compose up -d
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    - name: Wait for containers to be ready
      wait_for:
        port: 80
        host: "0.0.0.0"
        delay: 20
        timeout: 300
      become: no

    # Step 8: Run migrations
    - name: Run Django migrations
      shell: docker-compose exec -T web python manage.py migrate
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    - name: Collect static files
      shell: docker-compose exec -T web python manage.py collectstatic --noinput
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      ignore_errors: yes

    # Step 9: Verify PostGIS extensions
    - name: Verify PostGIS extensions
      shell: docker-compose exec -T db psql -U postgres -d geo_mapping_db -c "SELECT extname FROM pg_extension WHERE extname LIKE '%postgis%';"
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: postgis_check
      ignore_errors: yes

    - name: Display PostGIS extensions
      debug:
        msg: "PostGIS extensions: {{ postgis_check.stdout }}"
      when: postgis_check.stdout is defined

    # Cleanup
    - name: Remove uploaded zip file
      file:
        path: "/tmp/{{ zip_file }}"
        state: absent

    - name: Clean up local temp files
      file:
        path: "{{ temp_dir }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: no

    - name: Clean up local zip file
      file:
        path: "/tmp/{{ zip_file }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: no

    # Final status
    - name: Show container status
      shell: docker-compose ps
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: container_status

    - name: Display deployment status
      debug:
        msg: |
          🚀 Deployment completed successfully!
          
          Application URL: http://{{ ansible_default_ipv4.address }}
          Application URL: http://ec2-3-110-50-194.ap-south-1.compute.amazonaws.com
          
          Container Status:
          {{ container_status.stdout }}
          
          Useful commands:
          - Check containers: cd {{ project_dir }} && docker-compose ps
          - View logs: cd {{ project_dir }} && docker-compose logs -f
          - Access container: cd {{ project_dir }} && docker-compose exec web bash