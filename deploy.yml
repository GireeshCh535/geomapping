---
- name: Deploy GeoMapping Application - CLOUDFRONT-ONLY PRODUCTION
  hosts: aws_servers
  become: yes
  vars:
    repo_url: "https://gitlab.com/rohit.boni/geomapping.git"
    project_name: "geomapping"
    project_dir: "/opt/{{ project_name }}"
    temp_dir: "/tmp/{{ project_name }}_deploy"
    zip_file: "{{ project_name }}.zip"
    domain: "gis-portal.1acre.in"

  tasks:
    # ===================================
    # STEP 1: PREPARE LOCAL DEPLOYMENT
    # ===================================
    
    - name: Clean up old temp files on local machine
      file:
        path: "{{ temp_dir }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: no

    - name: Clone repository to local machine
      git:
        repo: "{{ repo_url }}"
        dest: "{{ temp_dir }}"
        depth: 1
      delegate_to: localhost
      run_once: true
      become: no

    - name: Create zip archive of the project
      archive:
        path: "{{ temp_dir }}"
        dest: "/tmp/{{ zip_file }}"
        format: zip
      delegate_to: localhost
      run_once: true
      become: no

    - name: Upload zip file to server
      copy:
        src: "/tmp/{{ zip_file }}"
        dest: "/tmp/{{ zip_file }}"

    # ===================================
    # STEP 2: DOCKER INSTALLATION
    # ===================================
    
    - name: Check if Docker is installed
      command: which docker
      register: docker_installed
      ignore_errors: yes

    - name: Update apt cache
      apt:
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Install required packages for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - unzip
        state: present
      when: docker_installed.rc != 0

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: docker_installed.rc != 0

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: docker_installed.rc != 0

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Install Docker Compose standalone
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: docker_installed.rc != 0

    - name: Create docker-compose symlink
      file:
        src: /usr/local/bin/docker-compose
        dest: /usr/bin/docker-compose
        state: link
      when: docker_installed.rc != 0
      ignore_errors: yes

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset ssh connection to apply group changes
      meta: reset_connection

    # ===================================
    # STEP 3: AGGRESSIVE CLEANUP FOR DISK SPACE
    # ===================================
    
    - name: Check initial disk space
      shell: df -h
      register: initial_disk_space

    - name: Display initial disk usage
      debug:
        msg: "Initial disk usage: {{ initial_disk_space.stdout }}"

    - name: Check if project directory exists
      stat:
        path: "{{ project_dir }}"
      register: project_exists

    - name: Stop existing Docker containers (preserve volumes)
      shell: |
        cd {{ project_dir }}
        docker-compose down --remove-orphans
      when: project_exists.stat.exists
      ignore_errors: yes
      become_user: ubuntu

    - name: Wait for containers to stop completely
      pause:
        seconds: 10
      when: project_exists.stat.exists

    # SAFE Docker cleanup - PRESERVES DATA VOLUMES
    - name: Safe Docker cleanup - preserves database and media data
      shell: |
        echo "🧹 Starting SAFE Docker cleanup (preserving data)..."
        
        # Stop all running containers
        docker stop $(docker ps -aq) 2>/dev/null || true
        
        # Remove all containers
        docker rm $(docker ps -aq) 2>/dev/null || true
        
        # Remove all images (except base images we'll need)
        docker image prune -af
        
        # Remove ONLY unused/orphaned volumes (NOT named volumes with data)
        # This is safer than 'docker volume prune -f'
        docker volume ls -qf dangling=true | xargs docker volume rm 2>/dev/null || true
        
        # Remove all networks
        docker network prune -f
        
        # Remove build cache
        docker builder prune -af
        
        # System-wide cleanup but PRESERVE volumes
        docker system prune -af
        
        echo "✅ SAFE Docker cleanup completed (data preserved)"
        
        # Show preserved volumes
        echo "📊 Preserved volumes:"
        docker volume ls | grep -E "(postgres_data|redis_data|media_volume)" || echo "No data volumes found yet"
      ignore_errors: yes

    # Clean up old static files and logs
    - name: Clean up old application files
      shell: |
        # Remove old project directory completely
        rm -rf {{ project_dir }}
        
        # Clean up any orphaned static files
        find /tmp -name "*tiles*" -type f -delete 2>/dev/null || true
        find /tmp -name "*.png" -type f -delete 2>/dev/null || true
        find /tmp -name "*.mvt" -type f -delete 2>/dev/null || true
        
        # Clean up logs
        find /var/log -name "*.log" -size +100M -delete 2>/dev/null || true
        
        # Clean apt cache
        apt-get clean
        apt-get autoremove -y
        
        echo "✅ Application cleanup completed"
      ignore_errors: yes

    - name: Check disk space after cleanup
      shell: df -h
      register: cleaned_disk_space

    - name: Display disk space after cleanup
      debug:
        msg: "Disk space after cleanup: {{ cleaned_disk_space.stdout }}"

    - name: Create fresh project directory
      shell: |
        mkdir -p {{ project_dir }}
        chown ubuntu:ubuntu {{ project_dir }}

    # ===================================
    # STEP 4: DEPLOY NEW CODE
    # ===================================
    
    - name: Extract zip file to temporary location
      unarchive:
        src: "/tmp/{{ zip_file }}"
        dest: "/tmp"
        remote_src: yes

    - name: Find extracted directory and move contents
      shell: |
        EXTRACTED_DIR=$(find /tmp -maxdepth 1 -name "{{ project_name }}_deploy*" -type d | head -1)
        if [ -n "$EXTRACTED_DIR" ]; then
          mv "$EXTRACTED_DIR"/* {{ project_dir }}/
          mv "$EXTRACTED_DIR"/.* {{ project_dir }}/ 2>/dev/null || true
          rm -rf "$EXTRACTED_DIR"
          chown -R ubuntu:ubuntu {{ project_dir }}
        else
          echo "No extracted directory found"
          exit 1
        fi

    - name: Update Django ALLOWED_HOSTS setting
      lineinfile:
        path: "{{ project_dir }}/geo_mapping/settings.py"
        regexp: '^ALLOWED_HOSTS\s*='
        line: "ALLOWED_HOSTS = ['*']"

    - name: Ensure DEBUG = False for production
      lineinfile:
        path: "{{ project_dir }}/geo_mapping/settings.py"
        regexp: '^DEBUG\s*='
        line: "DEBUG = False"

    - name: Force CloudFront-only tile serving
      lineinfile:
        path: "{{ project_dir }}/geo_mapping/settings.py"
        regexp: '^TILE_SERVING_METHOD\s*='
        line: "TILE_SERVING_METHOD = 'cloudfront_only'"

    # ===================================
    # STEP 5: SSL CERTIFICATE
    # ===================================
    
    - name: Check if SSL certificate exists
      stat:
        path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      register: ssl_cert

    - name: Install certbot and nginx plugin
      apt:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
      when: not ssl_cert.stat.exists

    - name: Stop nginx if running (for certbot)
      systemd:
        name: nginx
        state: stopped
      ignore_errors: yes
      when: not ssl_cert.stat.exists

    - name: Generate SSL certificate
      shell: |
        certbot certonly --standalone \
          --non-interactive \
          --agree-tos \
          --email admin@1acre.in \
          -d {{ domain }}
      when: not ssl_cert.stat.exists

    - name: Ensure SSL certificate permissions
      file:
        path: /etc/letsencrypt
        state: directory
        mode: '0755'
        recurse: yes

    # ===================================
    # STEP 6: BUILD AND START CONTAINERS
    # ===================================
    
    - name: Create necessary directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}/logs"
        - "{{ project_dir }}/temp"

    - name: Build Docker containers (no cache for fresh build)
      shell: docker-compose build --no-cache
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    - name: Start Docker containers
      shell: docker-compose up -d
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    - name: Add SSL renewal cron job
      cron:
        name: "SSL renewal"
        job: "certbot renew --quiet --deploy-hook 'docker restart {{ project_name }}_nginx_1'"
        minute: "0"
        hour: "3"
        weekday: "1"

    - name: Wait for containers to be ready
      wait_for:
        port: 443
        host: "0.0.0.0"
        delay: 30
        timeout: 300
      become: no

    # ===================================
    # STEP 7: DATABASE & MINIMAL STATIC FILES
    # ===================================
    
    - name: Run Django migrations
      shell: docker-compose exec -T web python manage.py migrate
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    # CRITICAL: Collect ONLY essential static files (NO TILES)
    - name: Collect minimal static files (CSS, JS, admin only - NO TILES)
      shell: |
        docker-compose exec -T web sh -c "
        # Remove any existing static files first
        rm -rf /app/staticfiles/* || true
        
        # Collect only essential files, explicitly ignore all tile patterns
        python manage.py collectstatic --noinput \
          --ignore='*.png' \
          --ignore='tiles_png' \
          --ignore='real_estate_tiles_png' \
          --ignore='tiles' \
          --ignore='real_estate_tiles' \
          --ignore='combined' \
          --verbosity=1 \
          --clear
        
        echo '✅ Static files collection completed (tiles excluded)'
        "
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      ignore_errors: yes

    # ===================================
    # STEP 8: VERIFY S3/CLOUDFRONT CONNECTION
    # ===================================
    
    - name: Test S3 and CloudFront connectivity
      shell: |
        docker-compose exec -T web python manage.py shell -c "
        print('🔍 Testing S3/CloudFront connectivity...')
        
        from maps.s3_upload_service import S3TileUploadService
        
        # Test S3 connection
        uploader = S3TileUploadService()
        connection = uploader.test_connection()
        
        if connection['success']:
            print(f'✅ S3 Connection successful!')
            print(f'   Bucket: {connection[\"bucket\"]}')
            print(f'   Region: {connection[\"region\"]}')
        else:
            print(f'❌ S3 Connection failed: {connection[\"error\"]}')
            exit(1)
        
        # Test CloudFront domain
        from django.conf import settings
        if hasattr(settings, 'CLOUDFRONT_DOMAIN') and settings.CLOUDFRONT_DOMAIN:
            print(f'✅ CloudFront domain configured: {settings.CLOUDFRONT_DOMAIN}')
        else:
            print('⚠️  CloudFront domain not configured')
        
        print('🌐 Tile serving will use CloudFront-only mode')
        print('📋 To generate tiles, run:')
        print('   docker-compose exec web python manage.py generate_and_upload_tiles --city CITY_NAME')
        "
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      ignore_errors: yes

    # ===================================
    # STEP 9: VERIFY POSTGIS
    # ===================================
    
    - name: Verify PostGIS extensions are installed
      shell: docker-compose exec -T db psql -U postgres -d geo_mapping_db -c "SELECT extname FROM pg_extension WHERE extname LIKE '%postgis%';"
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: postgis_check
      ignore_errors: yes

    - name: Display PostGIS extensions
      debug:
        msg: "PostGIS extensions installed: {{ postgis_check.stdout }}"
      when: postgis_check.stdout is defined

    # ===================================
    # STEP 10: CLEANUP & FINAL STATUS
    # ===================================
    
    - name: Remove uploaded zip file
      file:
        path: "/tmp/{{ zip_file }}"
        state: absent

    - name: Clean up local temp files
      file:
        path: "{{ temp_dir }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: no

    - name: Clean up local zip file
      file:
        path: "/tmp/{{ zip_file }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: no

    - name: Final disk space check
      shell: df -h
      register: final_disk_space

    - name: Display final disk usage
      debug:
        msg: "Final disk usage: {{ final_disk_space.stdout }}"

    - name: Show container status
      shell: docker-compose ps
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: container_status

    - name: Test application health
      uri:
        url: "http://{{ ansible_default_ipv4.address }}/api/"
        method: GET
        timeout: 10
      register: health_check
      ignore_errors: yes

    # ===================================
    # DEPLOYMENT SUCCESS MESSAGE
    # ===================================
    
    - name: Display deployment status
      debug:
        msg: |
          🎉 CLOUDFRONT-ONLY DEPLOYMENT COMPLETED SUCCESSFULLY!
          
          🌐 Application URLs:
            - HTTPS: https://{{ domain }}
            - HTTP:  http://{{ ansible_default_ipv4.address }}
            - API:   https://{{ domain }}/api/
            - Health Check: {{ 'PASSED' if health_check.status == 200 else 'FAILED' }}
          
          📊 Container Status:
          {{ container_status.stdout }}
          
          💾 Disk Usage Optimization:
          {{ final_disk_space.stdout }}
          
          🗂️ Key Features Deployed:
            ✅ PostgreSQL with PostGIS extensions
            ✅ Redis caching (4GB, optimized for GIS)
            ✅ CloudFront-ONLY tile serving (no local tiles)
            ✅ SSL certificate with auto-renewal
            ✅ Production-optimized Django settings
            ✅ Maximum disk space optimization
            ✅ Direct S3 tile upload capability
          
          🚀 TILE GENERATION COMMANDS:
            # Generate city tiles directly to S3/CloudFront
            docker-compose exec web python manage.py generate_and_upload_tiles --city bangalore --type city
            
            # Generate real estate tiles directly to S3/CloudFront  
            docker-compose exec web python manage.py generate_and_upload_tiles --type real-estate
            
            # Generate both city and real estate tiles
            docker-compose exec web python manage.py generate_and_upload_tiles --city bangalore --type both
            
            # Test S3 connection before generating
            docker-compose exec web python manage.py generate_and_upload_tiles --test-connection
            
            # Dry run (generate but don't upload)
            docker-compose exec web python manage.py generate_and_upload_tiles --city bangalore --dry-run
          
          🔧 Useful Commands:
            - Check containers: cd {{ project_dir }} && docker-compose ps
            - View logs: cd {{ project_dir }} && docker-compose logs -f [service]
            - Django shell: cd {{ project_dir }} && docker-compose exec web python manage.py shell
            - Monitor disk: df -h && docker system df
            - Clean Docker: docker system prune -f
          
          📁 Project Directory: {{ project_dir }}
          
          ⚠️ IMPORTANT NOTES:
            🔥 NO TILES STORED LOCALLY - All tiles go directly to S3/CloudFront
            🔥 Static files collection excludes ALL tile patterns
            🔥 Deployment uses minimal disk space (no tile storage)
            🔥 Tiles are generated on-demand and uploaded to CloudFront
            🔥 Maximum performance with CloudFront CDN delivery
            🔥 Zero disk space issues with tile storage
          
          🎯 NEXT STEPS:
            1. Generate tiles for your cities using the commands above
            2. Tiles will be available instantly via CloudFront
            3. Your application is ready for production traffic
            4. Monitor CloudFront cache hit rates for optimal performance
          
          🌟 Your CloudFront-optimized GIS portal is now production-ready!