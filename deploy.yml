---
- name: Deploy GeoMapping Application
  hosts: all
  become: yes
  remote_user: root
  vars:
    repo_url: "https://gitlab.com/rohit.boni/geomapping.git"
    project_name: "geomapping"
    project_dir: "/opt/{{ project_name }}"
    temp_dir: "/tmp/{{ project_name }}_{{ ansible_date_time.epoch }}"
    archive_name: "{{ project_name }}_{{ ansible_date_time.epoch }}.tar.gz"
    container_prefix: "geomapping"

  tasks:
    - name: Clean up old temp files quickly
      shell: |
        rm -rf /tmp/geomapping* || true
        rm -rf /tmp/geomapping_*.tar.gz || true
      delegate_to: localhost
      run_once: true
      ignore_errors: yes

    - name: Install git on localhost
      package:
        name: git
        state: present
      delegate_to: localhost
      run_once: true
      ignore_errors: yes

    - name: Clone the GitLab repository (shallow clone for speed)
      shell: |
        cd /tmp
        rm -rf {{ temp_dir }}
        git clone --depth 1 {{ repo_url }} {{ temp_dir }}
      delegate_to: localhost
      run_once: true

    - name: Create .tar.gz archive of the cloned repository
      shell: |
        cd /tmp
        tar -czf {{ archive_name }} -C {{ temp_dir }} .
      delegate_to: localhost
      run_once: true

    - name: Send archive to remote server
      copy:
        src: "/tmp/{{ archive_name }}"
        dest: "/tmp/{{ archive_name }}"

    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Install Docker Compose (standalone)
      pip:
        name: docker-compose
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Stop and remove old Docker containers (quick)
      shell: |
        cd {{ project_dir }} && docker-compose down --remove-orphans || true
        docker system prune -f || true
      ignore_errors: yes

    - name: Remove old project directory (quick)
      shell: rm -rf {{ project_dir }}
      ignore_errors: yes

    - name: Re-create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'

    - name: Unarchive new code
      unarchive:
        src: "/tmp/{{ archive_name }}"
        dest: "{{ project_dir }}"
        remote_src: yes

    - name: Update Django ALLOWED_HOSTS in settings.py
      lineinfile:
        path: "{{ project_dir }}/geo_mapping/settings.py"
        regexp: '^ALLOWED_HOSTS\s*='
        line: "ALLOWED_HOSTS = ['*']"

    - name: Build Docker containers
      shell: docker-compose build --no-cache
      args:
        chdir: "{{ project_dir }}"

    - name: Start Docker containers in background
      shell: docker-compose up -d
      args:
        chdir: "{{ project_dir }}"

    - name: Wait for containers to be ready
      wait_for:
        port: 8000
        host: "0.0.0.0"
        delay: 30
        timeout: 300

    - name: Run Django migrations
      shell: docker-compose exec -T web python manage.py migrate
      args:
        chdir: "{{ project_dir }}"

    - name: Collect static files
      shell: docker-compose exec -T web python manage.py collectstatic --noinput
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: yes

    - name: Setup cities (if management command exists)
      shell: docker-compose exec -T web python manage.py setup_cities
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: yes

    - name: Delete transferred archive file from remote
      file:
        path: "/tmp/{{ archive_name }}"
        state: absent

    - name: Clean up localhost temp files (quick)
      shell: |
        rm -rf {{ temp_dir }} || true
        rm -f /tmp/{{ archive_name }} || true
      delegate_to: localhost
      run_once: true
      ignore_errors: yes

    - name: Display deployment information
      debug:
        msg: |
          🚀 Deployment completed successfully!
          
          Application URL: http://{{ ansible_default_ipv4.address }}:8000
          
          Useful commands:
          - Check containers: cd {{ project_dir }} && docker-compose ps
          - View logs: cd {{ project_dir }} && docker-compose logs -f
          - Access shell: cd {{ project_dir }} && docker-compose exec web bash
          
          Project directory: {{ project_dir }}