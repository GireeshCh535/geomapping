name: Build and Deploy to ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.GEOMAPPING_AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.GEOMAPPING_ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ secrets.GEOMAPPING_ECS_CLUSTER }}
      ECS_SERVICE: ${{ secrets.GEOMAPPING_ECS_SERVICE }}
      ECS_TASK_DEFINITION: ${{ secrets.GEOMAPPING_ECS_TASK_DEFINITION }}
      ECS_CONTAINER_NAME: web
      ECS_SUBNET_1: ${{ secrets.GEOMAPPING_ECS_SUBNET_1 }}
      ECS_SUBNET_2: ${{ secrets.GEOMAPPING_ECS_SUBNET_2 }}
      ECS_SECURITY_GROUP: ${{ secrets.GEOMAPPING_ECS_SECURITY_GROUP }}
      ECS_ASSIGN_PUBLIC_IP: ${{ secrets.GEOMAPPING_ECS_ASSIGN_PUBLIC_IP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          missing=()
          for name in AWS_REGION ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_DEFINITION \
            ECS_SUBNET_1 ECS_SUBNET_2 ECS_SECURITY_GROUP ECS_ASSIGN_PUBLIC_IP; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions Secrets (Secrets tab):"
            echo "  GEOMAPPING_AWS_REGION, GEOMAPPING_ECR_REPOSITORY, GEOMAPPING_ECS_CLUSTER,"
            echo "  GEOMAPPING_ECS_SERVICE, GEOMAPPING_ECS_TASK_DEFINITION, GEOMAPPING_ECS_SUBNET_1,"
            echo "  GEOMAPPING_ECS_SUBNET_2, GEOMAPPING_ECS_SECURITY_GROUP, GEOMAPPING_ECS_ASSIGN_PUBLIC_IP"
            echo "Unset in this run: ${missing[*]}"
            echo "Add under Settings → Secrets and variables → Actions → Secrets (not Variables)."
            exit 1
          fi
          repo="${ECR_REPOSITORY//[$'\t\r\n ']}"
          if [[ "$repo" == *"/"* ]] || [[ "$repo" == *":"* ]]; then
            echo "::error::GEOMAPPING_ECR_REPOSITORY must be the ECR repo name only (e.g. geomapping-staging-web), not a full image URL."
            exit 1
          fi
          echo "AWS region: ${AWS_REGION}"
          echo "ECR repository: ${repo}"
          echo "ECS cluster: ${ECS_CLUSTER}"
          echo "ECS service: ${ECS_SERVICE}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Django migrations
        id: migrate
        run: |
          set -euo pipefail

          NETWORK_JSON=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' \
            --output json)

          if [ -z "${NETWORK_JSON}" ] || [ "${NETWORK_JSON}" = "null" ]; then
            echo "::warning::Could not read network config from ECS service; using GEOMAPPING_ECS_SUBNET_* secrets."
            SUBNETS="${ECS_SUBNET_1},${ECS_SUBNET_2}"
            SGS="${ECS_SECURITY_GROUP}"
            PUBLIC_IP="${ECS_ASSIGN_PUBLIC_IP}"
          else
            SUBNETS=$(echo "${NETWORK_JSON}" | jq -r '[.subnets[]] | join(",")')
            SGS=$(echo "${NETWORK_JSON}" | jq -r '[.securityGroups[]] | join(",")')
            PUBLIC_IP=$(echo "${NETWORK_JSON}" | jq -r '.assignPublicIp')
            echo "Using ECS service network: subnets=${SUBNETS} assignPublicIp=${PUBLIC_IP}"
          fi

          OVERRIDES=$(jq -n \
            --arg name "${ECS_CONTAINER_NAME}" \
            '{
              containerOverrides: [{
                name: $name,
                command: ["python", "manage.py", "migrate", "--noinput"],
                healthCheck: {
                  command: ["CMD-SHELL", "true"],
                  interval: 30,
                  timeout: 5,
                  retries: 3,
                  startPeriod: 300
                }
              }]
            }')

          RUN_TASK_OUTPUT=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SGS}],assignPublicIp=${PUBLIC_IP}}" \
            --overrides "${OVERRIDES}" \
            --output json)

          TASK_ARN=$(echo "${RUN_TASK_OUTPUT}" | jq -r '.tasks[0].taskArn // empty')
          RUN_FAILURES=$(echo "${RUN_TASK_OUTPUT}" | jq -r '.failures[]? | "\(.reason): \(.detail // "no detail")"')

          if [ -n "${RUN_FAILURES}" ]; then
            echo "::error::ECS run-task failures:"
            echo "${RUN_FAILURES}"
          fi

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "null" ]; then
            echo "Failed to start migration task"
            exit 1
          fi

          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}"

          TASK_JSON=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --output json)

          STOP_CODE=$(echo "${TASK_JSON}" | jq -r '.tasks[0].stopCode // "unknown"')
          STOPPED_REASON=$(echo "${TASK_JSON}" | jq -r '.tasks[0].stoppedReason // "unknown"')
          CONTAINER_JSON=$(echo "${TASK_JSON}" | jq -r --arg name "${ECS_CONTAINER_NAME}" \
            '.tasks[0].containers[] | select(.name == $name)')
          EXIT_CODE=$(echo "${CONTAINER_JSON}" | jq -r '.exitCode // empty')
          CONTAINER_REASON=$(echo "${CONTAINER_JSON}" | jq -r '.reason // empty')

          if [ -z "${CONTAINER_JSON}" ] || [ "${CONTAINER_JSON}" = "null" ]; then
            echo "::error::No container named '${ECS_CONTAINER_NAME}' in task. Containers:"
            echo "${TASK_JSON}" | jq -r '.tasks[0].containers[] | "  - \(.name)"'
            echo "Set ECS container name in task definition to 'web' or update ECS_CONTAINER_NAME in the workflow."
            exit 1
          fi

          LOG_GROUP=$(aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query "taskDefinition.containerDefinitions[?name=='${ECS_CONTAINER_NAME}'].logConfiguration.options.\"awslogs-group\" | [0]" \
            --output text)

          if [ -n "${LOG_GROUP}" ] && [ "${LOG_GROUP}" != "None" ]; then
            TASK_ID="${TASK_ARN##*/}"
            LOG_STREAM=$(aws logs describe-log-streams \
              --log-group-name "${LOG_GROUP}" \
              --log-stream-name-prefix "web/${ECS_CONTAINER_NAME}/${TASK_ID}" \
              --order-by LastEventTime \
              --descending \
              --limit 5 \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null || true)
            if [ -n "${LOG_STREAM}" ] && [ "${LOG_STREAM}" != "None" ]; then
              echo "--- Migration CloudWatch logs (${LOG_GROUP}) ---"
              aws logs get-log-events \
                --log-group-name "${LOG_GROUP}" \
                --log-stream-name "${LOG_STREAM}" \
                --limit 100 \
                --query 'events[*].message' \
                --output text || true
              echo "--- end logs ---"
            fi
          fi

          if [ "${EXIT_CODE}" = "0" ]; then
            echo "Migrations completed successfully"
            exit 0
          fi

          echo "::error::Migration task failed"
          echo "stopCode: ${STOP_CODE}"
          echo "stoppedReason: ${STOPPED_REASON}"
          echo "container exitCode: ${EXIT_CODE:-None}"
          if [ -n "${CONTAINER_REASON}" ] && [ "${CONTAINER_REASON}" != "null" ]; then
            echo "container reason: ${CONTAINER_REASON}"
          fi
          echo "Check CloudWatch log group: ${LOG_GROUP:-unknown}"
          exit 1

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"
