name: Build and Deploy to ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: master

# Non-sensitive deploy config: repo/org Variables (GEOMAPPING_* prefix).
# Credentials only: Secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY.
env:
  AWS_REGION: ${{ vars.GEOMAPPING_AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.GEOMAPPING_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.GEOMAPPING_ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.GEOMAPPING_ECS_SERVICE }}
  ECS_TASK_DEFINITION: ${{ vars.GEOMAPPING_ECS_TASK_DEFINITION }}
  ECS_CONTAINER_NAME: web
  ECS_SUBNET_1: ${{ vars.GEOMAPPING_ECS_SUBNET_1 }}
  ECS_SUBNET_2: ${{ vars.GEOMAPPING_ECS_SUBNET_2 }}
  ECS_SECURITY_GROUP: ${{ vars.GEOMAPPING_ECS_SECURITY_GROUP }}
  ECS_ASSIGN_PUBLIC_IP: ${{ vars.GEOMAPPING_ECS_ASSIGN_PUBLIC_IP }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Django migrations
        id: migrate
        run: |
          set -euo pipefail
          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --network-configuration "awsvpcConfiguration={subnets=[${ECS_SUBNET_1},${ECS_SUBNET_2}],securityGroups=[${ECS_SECURITY_GROUP}],assignPublicIp=${ECS_ASSIGN_PUBLIC_IP}}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"${ECS_CONTAINER_NAME}\",\"command\":[\"python\",\"manage.py\",\"migrate\",\"--noinput\"]}]}" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "Failed to start migration task"
            exit 1
          fi

          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query "tasks[0].containers[?name=='${ECS_CONTAINER_NAME}'].exitCode | [0]" \
            --output text)

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi
          echo "Migrations completed successfully"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"
