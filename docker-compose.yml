# Docker Compose configuration for GeoMapping application
# This setup includes nginx in Docker that will use existing SSL certificates
# Host nginx will be stopped to avoid port conflicts
version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: geo_mapping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command: postgres -c max_connections=500 -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=128MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=4MB -c min_wal_size=1GB -c max_wal_size=4GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./init-postgis.sql:/docker-entrypoint-initdb.d/02-init-postgis.sql
    ports:
      - "127.0.0.1:5432:5432"  # CHANGED: Bind to localhost only for security
    restart: unless-stopped
    shm_size: 256mb  # Increase shared memory for better performance

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"  # CHANGED: Bind to localhost only for security
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
      --loglevel notice
    restart: unless-stopped

  web:
    build: .
    expose:
      - "8000"  # CHANGED: Only expose, don't bind to host ports (nginx will proxy)
    environment:
      - DJANGO_DB_HOST=db
      - DJANGO_DB_PORT=5432
      - DJANGO_DB_SSLMODE=disable
      - DJANGO_DB_NAME=geo_mapping_db
      - DJANGO_DB_USER=postgres
      - DJANGO_DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/1
      # Tiles: public CDN hostname (in front of R2). poll_sqs_tile_worker needs the same CLOUDFLARE_R2_* + PUBLIC_TILE_* as this service.
      - PUBLIC_TILE_CDN_HOST=tiles.citylands.in
      # R2 S3 API (boto3 writes); not tiles.citylands.in — that is PUBLIC_TILE_CDN_HOST for reads only.
      # Format: https://<CLOUDFLARE_ACCOUNT_ID>.r2.cloudflarestorage.com
      - CLOUDFLARE_R2_ENDPOINT_URL=https://5cffd3efb5504dd9789406854c5bab60.r2.cloudflarestorage.com
      - CLOUDFLARE_R2_BUCKET_NAME=gis-portal-layers
      - USE_CLOUDFRONT=False
      - ENABLE_CLOUDFRONT_INVALIDATION=False
      - DEVELOPER_BACKEND_API_URL=${DEVELOPER_BACKEND_API_URL:-https://be.1acre.in}
      # Optional: default caller hostname when no Origin/Referer/X-API-Caller-Host (non-strict paths only; layers/tiles/router etc. always need headers — see maps.authentication)
      - API_KEY_DOMAIN_FALLBACK_HOST=${API_KEY_DOMAIN_FALLBACK_HOST:-prod-be-aws.1acre.in}
      # Fix 4: 4 workers, 60s timeout for faster response; webhook work offloaded to background
      - WEB_CONCURRENCY=4
      - GUNICORN_TIMEOUT=60
      # Fix 6: Keep DEBUG enabled unless explicitly overridden in .env
      - DJANGO_DEBUG=${DJANGO_DEBUG:-true}
      - TILE_CALLBACK_SECRET=f9bf4828c58d01cfc1efe54f71ff0ea9980ad5b6b755e52ae8ea2e0c334c22a4
      - TILE_SQS_QUEUE_URL=https://sqs.ap-south-1.amazonaws.com/471112704924/geomapping-tile-gen-queue
      # If TILE_SQS_QUEUE_URL is AWS SQS, set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION in .env
      - TILE_CALLBACK_BASE_URL=https://layers.citylands.in/
      # Absolute tile URLs in API JSON (Django /api/tiles); leave unset for path-only URLs on whatever host the client uses.
      - TILE_PROXY_PUBLIC_BASE_URL=https://layers.citylands.in
      # Verbose [TILE_DEBUG] lines: set TILE_DEBUG_PRINTS=true|false; omit to follow DJANGO_DEBUG.
      # - TILE_DEBUG_PRINTS=true
      - CLOUDFLARE_R2_ACCESS_KEY_ID=6df209d58f44c6b0f037a24b7f7215b0
      - CLOUDFLARE_R2_SECRET_ACCESS_KEY=b6bd718dcfd3d8c70605cb754f3995c7dfd278e32aa781112443dec61c0b3548
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: sh -c "sleep 15 && python manage.py migrate && gunicorn geo_mapping.wsgi:application -c gunicorn_config.py"
    restart: unless-stopped

  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local