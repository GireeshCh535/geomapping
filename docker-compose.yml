# Docker Compose configuration for GeoMapping application
# This setup includes nginx in Docker that will use existing SSL certificates
# Host nginx will be stopped to avoid port conflicts
version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: geo_mapping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command: postgres -c max_connections=500 -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=128MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=4MB -c min_wal_size=1GB -c max_wal_size=4GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./init-postgis.sql:/docker-entrypoint-initdb.d/02-init-postgis.sql
    ports:
      - "127.0.0.1:5432:5432"  # CHANGED: Bind to localhost only for security
    restart: unless-stopped
    shm_size: 256mb  # Increase shared memory for better performance

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"  # CHANGED: Bind to localhost only for security
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
      --loglevel notice
    restart: unless-stopped

  web:
    build: .
    expose:
      - "8000"  # CHANGED: Only expose, don't bind to host ports (nginx will proxy)
    environment:
      - DJANGO_DB_HOST=db
      - DJANGO_DB_NAME=geo_mapping_db
      - DJANGO_DB_USER=postgres
      - DJANGO_DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/1
      - CLOUDFRONT_DISTRIBUTION_ID=E3VZOEKNMYD012
      - ENABLE_CLOUDFRONT_INVALIDATION=True  # ✅ PROD: Enable CloudFront invalidation
      - DEVELOPER_BACKEND_API_URL=${DEVELOPER_BACKEND_API_URL:-https://be.1acre.in}
      - WEB_CONCURRENCY=2  # Use 2 on 2-CPU servers to avoid OOM; increase if more CPUs/RAM
      - TILE_CALLBACK_SECRET=f9bf4828c58d01cfc1efe54f71ff0ea9980ad5b6b755e52ae8ea2e0c334c22a4
      - TILE_USE_LAMBDA=true
      - TILE_GENERATION_LAMBDA_ARN=arn:aws:lambda:ap-south-1:471112704924:function:geomapping-tile-gen
      - AWS_DEFAULT_REGION=ap-south-1
      - AWS_SECRET_ACCESS_KEY=45QpOp2sGal943rYVef3WSdBv2OkcGA+4i3wkwfQ
      - LAND_PLOT_TILE_USE_LAMBDA=true
      - LAND_PLOT_TILE_LAMBDA_ARN=arn:aws:lambda:ap-south-1:471112704924:function:land-plot-tile-gen
      - AWS_ACCESS_KEY_ID=AKIAW3MEBMOOEQKR3BXV
      - TILE_CALLBACK_BASE_URL=https://layers.1acre.in
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: sh -c "sleep 15 && python manage.py migrate && gunicorn geo_mapping.wsgi:application -c gunicorn_config.py"
    restart: unless-stopped

  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local